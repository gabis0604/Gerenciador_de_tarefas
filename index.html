<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>App de Gestão de Tarefas</title>

    <!-- FONTE Bootswatch-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootswatch@4.5.2/dist/sketchy/bootstrap.min.css"
    />

    <!-- Google Font: Permanent Marker -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />


    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}" />
  </head>

  <body>
    <div class="page">
      <h1 class="titulo">App de Gestão de Tarefas</h1>

      <div class="task-card">
        <div class="task-card-top">
          <form action="/criar-tarefa" method="post" class="task-form">
            <input
              type="text"
              name="conteudo_tarefa"
              placeholder="Tarefa"
              class="task-input"
              autofocus
            />
            <button type="submit" class="task-btn">Guardar</button>
          </form>
        </div>

        <div class="task-card-bottom">
          <ul class="task-list">
            {% for tarefa in lista_de_tarefas %}
            <li class="task-item">
              <span class="task-text {% if tarefa.feita %}tarefa_feita{% endif %}">
                {{ tarefa.conteudo }}
              </span>

              <span class="task-actions">
                <a href="/tarefa-feita/{{ tarefa.id }}" class="icon-link" aria-label="Concluir tarefa">

                  <svg width="34" height="34" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <path fill="green" d="M2 2.5A1.5 1.5 0 0 1 3.5 1h9A1.5 1.5 0 0 1 14 2.5v11A1.5 1.5 0 0 1 12.5 15h-9A1.5 1.5 0 0 1 2 13.5v-11Zm1.5-.5a.5.5 0 0 0-.5.5v11a.5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5v-11a.5.5 0 0 0-.5-.5h-9Z"/>
                    <path fill="green" d="M10.97 5.97a.75.75 0 0 1 1.07 1.05L7.95 11.1a.75.75 0 0 1-1.08 0L4.95 9.18a.75.75 0 1 1 1.06-1.06l1.36 1.36 3.6-3.51Z"/>
                  </svg>
                </a>

                <a href="/eliminar-tarefa/{{ tarefa.id }}" class="icon-link" aria-label="Eliminar tarefa">

                  <svg width="34" height="34" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <path fill="red" d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm2.5 0A.5.5 0 0 1 8.5 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6Z"/>
                    <path fill="red" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1ZM4 4v9a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4H4Zm-1.5-1V2h11v1h-11Z"/>
                  </svg>
                </a>
              </span>
            </li>
            {% endfor %}
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
